services:
  minio:
    image: minio/minio
    container_name: nba_minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3

  chromadb:
    image: chromadb/chroma:latest
    container_name: nba_chromadb
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma

  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: nba_mlflow
    ports:
      - "5000:5000"
    command: mlflow server --host 0.0.0.0 --backend-store-uri /mlflow
    volumes:
      - mlflow_data:/mlflow

  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: nba_airflow
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__SECRET_KEY: "nba_intel_secret"
      MINIO_ENDPOINT: http://nba_minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    volumes:
      - airflow_data:/opt/airflow
      - /workspaces/nba-intel/airflow/dags:/opt/airflow/dags
      - /workspaces/nba-intel:/workspaces/nba-intel
    command: >
      bash -c "rm -f /opt/airflow/airflow-webserver.pid &&
               airflow db init &&
               sleep 5 &&
               airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@example.com || true &&
               airflow webserver --port 8080 &
               airflow scheduler"
    depends_on:
      - minio

volumes:
  minio_data:
  chroma_data:
  mlflow_data:
  airflow_data:
  